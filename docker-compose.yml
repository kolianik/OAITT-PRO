networks:
  edge_net:
  backend_net:
    internal: true
  inference_net:
    internal: true

services:
  postgres:
    image: postgres:17-alpine
    container_name: oaitt-postgres
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-transcribe_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secure_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-transcribe_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  gateway-orchestrator:
    build:
      context: .
      dockerfile: ./gateway/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
        CORP_CA_AUTO_TRUST: ${CORP_CA_AUTO_TRUST:-0}
      extra_hosts:
        - "host.docker.internal:host-gateway"
    container_name: oaitt-gateway
    restart: always
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-transcribe_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secure_pass}
      - ADMIN_KEY=${ADMIN_KEY:-admin-secret-key}
      - WHISPERX_URL=http://whisperx-service:9007
      - GIGAAM_URL=http://gigaam-service:9007
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-}
    volumes:
      - oaitt_shared_data:/shared_data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend_net
      - inference_net

  whisperx-service:
    build:
      context: .
      dockerfile: ./whisperx/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
        CORP_CA_AUTO_TRUST: ${CORP_CA_AUTO_TRUST:-0}
      extra_hosts:
        - "host.docker.internal:host-gateway"
    container_name: oaitt-whisperx
    restart: always
    environment:
      - DEVICE=${DEVICE:-cuda}
      - COMPUTE_TYPE=${WHISPERX_COMPUTE_TYPE:-float16}
      - WHISPERX_BATCH_SIZE=${WHISPERX_BATCH_SIZE:-4}
      - WHISPERX_MODEL=${WHISPERX_MODEL:-bzikst/faster-whisper-large-v3-russian}
      - WHISPERX_ALIGN_MODEL=${WHISPERX_ALIGN_MODEL:-jonatasgrosman/wav2vec2-xls-r-1b-russian}
      - HF_TOKEN=${HF_TOKEN}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-}
      # Explicit GPU isolation: Docker device_ids/count:all do not inject CUDA_VISIBLE_DEVICES
      # under WSL2 — without this both containers enumerate cuda:0 = RTX 3080.
      - CUDA_VISIBLE_DEVICES=GPU-6fb40b13-2b3b-8d97-59ec-0691a1e2384a   # RTX 3050 4GB
    volumes:
      - whisperx_model_cache:/app/data
      - oaitt_shared_data:/shared_data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - inference_net

  gigaam-service:
    build:
      context: .
      dockerfile: ./gigaam/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
        CORP_CA_AUTO_TRUST: ${CORP_CA_AUTO_TRUST:-0}
      extra_hosts:
        - "host.docker.internal:host-gateway"
    container_name: oaitt-gigaam
    restart: always
    environment:
      - DEVICE=${DEVICE:-cuda}
      - GIGAAM_MODEL=${GIGAAM_MODEL:-v3_e2e_rnnt}
      - GIGAAM_ALIGN_MODEL=${GIGAAM_ALIGN_MODEL:-jonatasgrosman/wav2vec2-xls-r-1b-russian}
      - GIGAAM_BATCH_SIZE=${GIGAAM_BATCH_SIZE:-4}
      - GIGAAM_DENOISE=${GIGAAM_DENOISE:-true}
      - GIGAAM_DENOISE_MODEL=${GIGAAM_DENOISE_MODEL:-DeepFilterNet3}
      - GIGAAM_DENOISE_DEVICE=${GIGAAM_DENOISE_DEVICE:-cuda}
      - GIGAAM_DENOISE_CHUNK_SEC=${GIGAAM_DENOISE_CHUNK_SEC:-30}
      - GIGAAM_DENOISE_OVERLAP_SEC=${GIGAAM_DENOISE_OVERLAP_SEC:-2}
      - GIGAAM_ONNX_DIR=/app/data/gigaam_onnx
      - GIGAAM_WEIGHTS_DIR=/app/data/gigaam
      - GIGAAM_DEEPFILTER_DIR=/app/data/deepfilter
      - HF_HOME=/app/data
      - GIGAAM_OFFLINE_MODE=${GIGAAM_OFFLINE_MODE:-false}
      - GIGAAM_PREFETCH_DIARIZATION=${GIGAAM_PREFETCH_DIARIZATION:-true}
      - GIGAAM_DIARIZE_BATCH_SIZE=${GIGAAM_DIARIZE_BATCH_SIZE:-8}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,::1,host.docker.internal,gateway-orchestrator,whisperx-service,gigaam-service,postgres,front-proxy,certbot,.local,.internal}
      - no_proxy=${no_proxy:-localhost,127.0.0.1,::1,host.docker.internal,gateway-orchestrator,whisperx-service,gigaam-service,postgres,front-proxy,certbot,.local,.internal}
      # Corporate MITM CA (S3): trust the merged bundle so HuggingFace + the GigaAM Sber-CDN
      # urllib path verify against it (urllib honors SSL_CERT_FILE; requests/hub honor REQUESTS_CA_BUNDLE).
      - REQUESTS_CA_BUNDLE=${REQUESTS_CA_BUNDLE:-/etc/ssl/certs/ca-certificates.crt}
      - SSL_CERT_FILE=${SSL_CERT_FILE:-/etc/ssl/certs/ca-certificates.crt}
      - CURL_CA_BUNDLE=${CURL_CA_BUNDLE:-/etc/ssl/certs/ca-certificates.crt}
      - GIT_SSL_CAINFO=${GIT_SSL_CAINFO:-/etc/ssl/certs/ca-certificates.crt}
      - PYTORCH_ALLOC_CONF=expandable_segments:True
      - HF_TOKEN=${HF_TOKEN}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-}
      # Explicit GPU isolation: Docker device_ids does not inject CUDA_VISIBLE_DEVICES under
      # WSL2 — without this the container enumerates both GPUs with cuda:0 = RTX 3080.
      - CUDA_VISIBLE_DEVICES=GPU-154b8f89-cd78-c184-7743-f39274dc3abe   # RTX 3080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - gigaam_model_cache:/app/data
      - oaitt_shared_data:/shared_data
      # Corporate MITM CA (S3): staged roots available for an in-container update-ca-certificates
      # exec or CA rotation without a rebuild (the build-time merge is what trust relies on).
      - ./certs/extra-ca:/usr/local/share/ca-certificates/extra:ro
    healthcheck:
      test: ["CMD", "python3", "/app/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 3600s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - inference_net

  front-proxy:
    build:
      context: ./nginx
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
        CORP_CA_AUTO_TRUST: ${CORP_CA_AUTO_TRUST:-0}
      extra_hosts:
        - "host.docker.internal:host-gateway"
    container_name: oaitt-proxy
    restart: always
    ports:
      - "${PROXY_PORT_HTTPS:-443}:443"
      - "${PROXY_PORT_HTTP:-80}:80"
    volumes:
      - certs:/etc/letsencrypt
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway-orchestrator
    networks:
      - edge_net
      - backend_net

  certbot:
    image: certbot/dns-cloudflare
    container_name: oaitt-certbot
    restart: always
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - DOMAIN_NAME=${DOMAIN_NAME}
      - EMAIL=${EMAIL}
      # Route ACME / Cloudflare API through the resolved proxy when direct egress is blocked (S2).
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,::1,host.docker.internal,.local,.internal}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - certs:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "
      if [ -z \"$${CLOUDFLARE_API_TOKEN}\" ] || [ -z \"$${DOMAIN_NAME}\" ] || [ -z \"$${EMAIL}\" ]; then
        echo 'Cloudflare credentials or Domain/Email missing. Certbot will sleep.';
        while :; do sleep 3600; done;
      fi;
      mkdir -p /root/.secrets &&
      echo 'dns_cloudflare_api_token = '$${CLOUDFLARE_API_TOKEN} > /root/.secrets/cloudflare.ini &&
      chmod 600 /root/.secrets/cloudflare.ini &&
      if [ ! -f /etc/letsencrypt/active ]; then
        echo \"Acquiring real SSL wildcard certificate from Let's Encrypt...\" &&
        certbot certonly --dns-cloudflare --dns-cloudflare-credentials /root/.secrets/cloudflare.ini --agree-tos --email $${EMAIL} -d $${DOMAIN_NAME} -d *.$${DOMAIN_NAME} --non-interactive --cert-name transcribe &&
        touch /etc/letsencrypt/active;
      fi;
      while :; do
        certbot renew --dns-cloudflare --dns-cloudflare-credentials /root/.secrets/cloudflare.ini;
        sleep 24h & wait $${!};
      done"

secrets:
  # Optional file-based HF token (legacy whisperx bake-in). GigaAM uses runtime HF_TOKEN from .env.
  HF_TOKEN:
    file: ./secrets/hf_token

volumes:
  pgdata:
  certs:
  whisperx_model_cache:
  gigaam_model_cache:
  oaitt_shared_data:
